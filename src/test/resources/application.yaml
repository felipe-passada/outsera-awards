spring:
  application:
    name: outsera
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      platform: org.hibernate.dialect.H2Dialect
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true

